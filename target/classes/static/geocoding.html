<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Macwatts</title>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    body { margin: 0; font-family: Manrope, sans-serif; }
    #map { height: 100vh; width: 100%; }

    .top-bar {
      position: absolute; top: 10px; left: 10px; right: 10px; z-index: 10;
      display: flex; gap: 10px;
      background: #ffffff; padding: 10px; border-radius: 12px;
      border: 1px solid #e5e7eb;
    }

    .top-bar input {
      flex: 1; padding: 10px;
      border: 1px solid #e5e7eb; border-radius: 8px;
      font-size: 14px;
    }

    .top-bar button {
      padding: 10px 12px;
      border-radius: 8px;
      border: none;
      font-weight: 600;
      cursor: pointer;
    }

    #drawRoofBtn { 
      margin-top: 6px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #14b8a6;
      color: white;
      font-weight: 600;
      cursor: pointer;
      }

    #drawRoofBtn:hover { background: #0f766e; }

    #clearRoofBtn {
      margin-top: 6px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #02f179;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
    #clearRoofBtn:hover { background: #0f766e; }

    .panel {
      position: absolute; top: 150px; left: 10px;
      width: 260px;
      background: #ffffff; padding: 14px; border-radius: 12px;
      z-index: 10;
      display: flex; flex-direction: column; gap: 10px;
      border: 1px solid #e5e7eb;
    }

    #houseInfo { font-weight: 600; font-size: 14px; }
    #message { font-size: 13px; color: #6b7280; }

    #nextStepBtn {
      margin-top: 6px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #e5e7eb;
      color: #0c0c0c;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="top-bar">
  <input id="address" placeholder="Pesquisar morada..." />
  <button id="searchBtn">Pesquisar</button>
</div>

<div class="panel">
  <div id="houseInfo">Casa: nenhuma</div>
  <div id="message"></div>
  
  <button id="drawRoofBtn">Desenhar</button>
  <button id="clearRoofBtn">Limpar</button>
  <button id="nextStepBtn">Continuar</button>
</div>

<div id="map"></div>

<script>
let map;
let marker = null;
let polygon = null;
let drawing = false;
let roofPoints = [];
let geocoder;

const addressInput = document.getElementById("address");
const houseInfo = document.getElementById("houseInfo");
const message = document.getElementById("message");
const drawRoofBtn = document.getElementById("drawRoofBtn");
const clearRoofBtn = document.getElementById("clearRoofBtn");
const nextStepBtn = document.getElementById("nextStepBtn");

function initMap() {
  map = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 38.7223, lng: -9.1393 },
    zoom: 19,
    mapTypeId: "satellite",
    streetViewControl: false,
    mapTypeControl: false,
    fullscreenControl: false,
    rotateControl: false,
    scaleControl: true,
    tilt: 0,
    heading: 0
  });

  geocoder = new google.maps.Geocoder();

  map.addListener("click", (event) => {
    const lat = event.latLng.lat();
    const lng = event.latLng.lng();

    if (!drawing) setMarker(lat, lng);
    else addRoofPoint(lat, lng);
  });

  initAutocomplete();
}

function setMarker(lat, lng) {
  if (marker) marker.setMap(null);

  marker = new google.maps.Marker({
    position: { lat, lng },
    map,
    draggable: true
  });

  map.setCenter({ lat, lng });

  houseInfo.textContent = `Lat: ${lat.toFixed(6)}, Lng: ${lng.toFixed(6)}`;
}

function initAutocomplete() {
  const autocomplete = new google.maps.places.Autocomplete(addressInput);

  autocomplete.addListener("place_changed", () => {
    const place = autocomplete.getPlace();
    if (!place.geometry) return;

    const lat = place.geometry.location.lat();
    const lng = place.geometry.location.lng();

    setMarker(lat, lng);
  });
}

function searchAddress() {
  const address = addressInput.value;

  if (!address) {
    message.textContent = "Escreve uma morada";
    return;
  }

  geocoder.geocode({ address: address }, (results, status) => {
    if (status === "OK") {
      const location = results[0].geometry.location;

      setMarker(location.lat(), location.lng());
      map.setZoom(19);

      message.textContent = "Morada encontrada";
    } else {
      message.textContent = "Morada não encontrada";
    }
  });
}

// BOTÃO PESQUISAR
document.getElementById("searchBtn").onclick = searchAddress;

// ENTER NO INPUT
addressInput.addEventListener("keypress", (e) => {
  if (e.key === "Enter") {
    searchAddress();
  }
});

function startDrawing() {
  drawing = true;
  roofPoints = [];

  if (polygon) polygon.setMap(null);

  message.textContent = "Modo desenho ativo";
  drawRoofBtn.textContent = "Concluir";
}

function addRoofPoint(lat, lng) {
  roofPoints.push({ lat, lng });

  if (polygon) polygon.setMap(null);

  polygon = new google.maps.Polygon({
    paths: roofPoints,
    strokeColor: "#14b8a6",
    strokeWeight: 2,
    fillColor: "#14b8a6",
    fillOpacity: 0.2
  });

  polygon.setMap(map);

  houseInfo.textContent = `Pontos: ${roofPoints.length}`;
}

function finishDrawing() {
  if (roofPoints.length < 3) {
    message.textContent = "Precisas de 3 pontos";
    return;
  }

  drawing = false;
  drawRoofBtn.textContent = "Desenhar";

  const area = google.maps.geometry.spherical.computeArea(
    roofPoints.map(p => new google.maps.LatLng(p.lat, p.lng))
  );

  houseInfo.textContent = `Área: ${area.toFixed(1)} m²`;
  message.textContent = "Telhado criado";
}

function clearRoof() {
  if (polygon) polygon.setMap(null);

  roofPoints = [];
  drawing = false;

  drawRoofBtn.textContent = "Desenhar";
  houseInfo.textContent = "Casa: nenhuma";
  message.textContent = "Limpo";
}

function getCenter() {
  let lat = 0, lng = 0;
  roofPoints.forEach(p => {
    lat += p.lat;
    lng += p.lng;
  });
  return { lat: lat / roofPoints.length, lng: lng / roofPoints.length };
}

function saveData() {
  if (roofPoints.length < 3) {
    message.textContent = "Desenha o telhado primeiro";
    return false;
  }

  const areaSqm = google.maps.geometry.spherical.computeArea(
    roofPoints.map(p => new google.maps.LatLng(p.lat, p.lng))
  );

  const data = {
    address: addressInput.value,
    center: getCenter(),
    points: roofPoints,
    area: areaSqm,
    areaSqm
  };

  sessionStorage.setItem("roofSelection", JSON.stringify(data));
  return true;
}

drawRoofBtn.onclick = () => {
  if (!drawing) startDrawing();
  else finishDrawing();
};

clearRoofBtn.onclick = clearRoof;

nextStepBtn.onclick = () => {
  if (!saveData()) return;
  window.location.href = "questionario.html";
};

window.initMap = initMap;
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDb_0_8iNV8ojyt8nbqXKt7SBVgWGc-qRs&libraries=places,geometry&callback=initMap" async defer></script>

</body>
</html>
