<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Macwatts</title>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    body { margin: 0; font-family: Manrope, sans-serif; }
    #map {
      height: 100vh;
      width: 100%;
      border: 15px solid #e5e7eb;
      border-radius: 14px;
      box-sizing: border-box;
      overflow: hidden;
    }

    .shell {
      position: absolute; top: 10px; left: 10px; right: 10px; z-index: 12;
      border: 1px solid #bde7e2;
      border-radius: 14px;
      overflow: hidden;
      background: #f8fbfa;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
    }

    .top-bar {
      height: 60px;
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      gap: 10px;
    }

    .brand {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: 0.2px;
      color: #111827;
      white-space: nowrap;
    }

    .search-group {
      display: flex;
      gap: 10px;
      flex: 1;
    }

    .steps-bar {
      height: 52px;
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
      padding: 8px 16px 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .step-track {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      flex: 1 1 auto;
    }

    .step {
      position: relative;
      text-align: center;
      color: #9ca3af;
      font-weight: 700;
      font-size: 0.86rem;
      padding-top: 16px;
    }

    .step::before {
      content: "";
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 2px solid #d1d5db;
      background: #fff;
    }

    .step.done {
      color: #0f766e;
    }

    .step.done::before {
      border-color: #0f766e;
      background: #0f766e;
    }

    .step.active {
      color: #0f766e;
    }

    .step.active::before {
      border-color: #14b8a6;
      background: #14b8a6;
    }

    .top-bar input {
      flex: 1; padding: 10px;
      border: 1px solid #e5e7eb; border-radius: 8px;
      font-size: 14px;
    }

    .top-bar button {
      padding: 10px 12px;
      border-radius: 8px;
      border: none;
      font-weight: 600;
      cursor: pointer;
    }

    #drawRoofBtn { 
      flex: 1;
      padding: 10px 12px;
      border-radius: 10px;
      border: none;
      background: #14b8a6;
      color: white;
      font-weight: 600;
      cursor: pointer;
      }

    #drawRoofBtn:hover { background: #0f766e; }

    #clearRoofBtn {
      flex: 1;
      padding: 10px 12px;
      border-radius: 10px;
      border: none;
      background: #0f766e;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
    #clearRoofBtn:hover { background: #0b5f59; }

    .panel {
      position: absolute; top: 200px; left: 30px;
      width: 400px;
      background: #ffffff; padding: 16px; border-radius: 14px;
      z-index: 10;
      display: flex; flex-direction: column; gap: 10px;
      border: 1px solid #d7dde3;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
    }

    .panel-title { font-size: 18px; font-weight: 800; color: #1f2937; }
    .panel-text { font-size: 13px; color: #6b7280; line-height: 1.35; }
    .panel-divider { height: 1px; background: #e5e7eb; margin: 2px 0; }
    .panel-subtext { font-size: 12.5px; color: #6b7280; }

    #houseInfo { font-weight: 600; }
    #message { font-weight: 600; }

    .panel-actions { display: flex; gap: 8px; }

    #nextStepBtn {
      margin-top: 4px;
      padding: 10px 12px;
      border-radius: 10px;
      border: none;
      background: #e5e7eb;
      color: #6b7280;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="shell">
  <div class="top-bar">
    <div class="brand">Macwatts</div>
    <div class="search-group">
      <input id="address" placeholder="Pesquisar morada..." />
      <button id="searchBtn">Pesquisar</button>
    </div>
  </div>
  <div class="steps-bar">
    <div class="step-track">
      <div class="step active">O seu telhado</div>
      <div class="step">Questionário</div>
      <div class="step">Contacto</div>
      <div class="step">Próximo passo</div>
    </div>
  </div>
</div>

<div class="panel">
  <div class="panel-title">Selecione a sua Casa</div>
  <div class="panel-text">Carregue no mapa para ajustar o ponto da casa e desenhe o contorno do telhado para calcular área e radiação solar.</div>
  <div class="panel-divider"></div>
  <div id="houseInfo" class="panel-subtext">Casa selecionada: nenhuma. Clica no mapa para mudar o pino.</div>
  <div id="message" class="panel-subtext">Sol no telhado: sem dados.</div>
  <div class="panel-actions">
    <button id="drawRoofBtn">Desenhar telhado</button>
    <button id="clearRoofBtn">Limpar telhado</button>
  </div>
  <button id="nextStepBtn">Continuar</button>
</div>

<div id="map"></div>

<script>
let map;
let marker = null;
let polygon = null;
let drawing = false;
let roofPoints = [];
let geocoder;

const addressInput = document.getElementById("address");
const houseInfo = document.getElementById("houseInfo");
const message = document.getElementById("message");
const drawRoofBtn = document.getElementById("drawRoofBtn");
const clearRoofBtn = document.getElementById("clearRoofBtn");
const nextStepBtn = document.getElementById("nextStepBtn");

function initMap() {
  map = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 38.7223, lng: -9.1393 },
    zoom: 19,
    mapTypeId: "satellite",
    streetViewControl: false,
    mapTypeControl: false,
    fullscreenControl: false,
    rotateControl: false,
    scaleControl: true,
    tilt: 0,
    heading: 0
  });

  geocoder = new google.maps.Geocoder();

  map.addListener("click", (event) => {
    const lat = event.latLng.lat();
    const lng = event.latLng.lng();

    if (!drawing) setMarker(lat, lng);
    else addRoofPoint(lat, lng);
  });

  initAutocomplete();
}

function setMarker(lat, lng) {
  if (marker) marker.setMap(null);

  marker = new google.maps.Marker({
    position: { lat, lng },
    map,
    draggable: true
  });

  marker.addListener("dragend", (event) => {
    const newLat = event.latLng.lat();
    const newLng = event.latLng.lng();
    houseInfo.textContent = `Lat: ${newLat.toFixed(6)}, Lng: ${newLng.toFixed(6)}`;
    reverseGeocode(newLat, newLng);
  });

  map.setCenter({ lat, lng });

  houseInfo.textContent = `Lat: ${lat.toFixed(6)}, Lng: ${lng.toFixed(6)}`;
  reverseGeocode(lat, lng);
}

function initAutocomplete() {
  const autocomplete = new google.maps.places.Autocomplete(addressInput);

  autocomplete.addListener("place_changed", () => {
    const place = autocomplete.getPlace();
    if (!place.geometry) return;

    const lat = place.geometry.location.lat();
    const lng = place.geometry.location.lng();

    setMarker(lat, lng);
  });
}

function reverseGeocode(lat, lng) {
  if (!geocoder) return;

  geocoder.geocode({ location: { lat, lng } }, (results, status) => {
    if (status === "OK" && results && results[0]) {
      const formatted = results[0].formatted_address;
      addressInput.value = formatted;
      houseInfo.textContent = formatted;
      message.textContent = "Morada atualizada";
    } else {
      message.textContent = "Sem morada para este ponto";
    }
  });
}

function searchAddress() {
  const address = addressInput.value;

  if (!address) {
    message.textContent = "Escreve uma morada";
    return;
  }

  geocoder.geocode({ address: address }, (results, status) => {
    if (status === "OK") {
      const location = results[0].geometry.location;

      setMarker(location.lat(), location.lng());
      map.setZoom(19);

      message.textContent = "Morada encontrada";
    } else {
      message.textContent = "Morada não encontrada";
    }
  });
}

// BOTÃO PESQUISAR
document.getElementById("searchBtn").onclick = searchAddress;

// ENTER NO INPUT
addressInput.addEventListener("keypress", (e) => {
  if (e.key === "Enter") {
    searchAddress();
  }
});

function startDrawing() {
  drawing = true;
  roofPoints = [];

  if (polygon) polygon.setMap(null);

  message.textContent = "Modo desenho ativo";
  drawRoofBtn.textContent = "Concluir";
}

function addRoofPoint(lat, lng) {
  roofPoints.push({ lat, lng });

  if (polygon) polygon.setMap(null);

  polygon = new google.maps.Polygon({
    paths: roofPoints,
    strokeColor: "#14b8a6",
    strokeWeight: 2,
    fillColor: "#14b8a6",
    fillOpacity: 0.2
  });

  polygon.setMap(map);

  houseInfo.textContent = `Pontos: ${roofPoints.length}`;
}

function finishDrawing() {
  if (roofPoints.length < 3) {
    message.textContent = "Precisas de 3 pontos";
    return;
  }

  drawing = false;
  drawRoofBtn.textContent = "Desenhar";

  const area = google.maps.geometry.spherical.computeArea(
    roofPoints.map(p => new google.maps.LatLng(p.lat, p.lng))
  );

  houseInfo.textContent = `Área: ${area.toFixed(1)} m²`;
  message.textContent = "Telhado criado";
}

function clearRoof() {
  if (polygon) polygon.setMap(null);

  roofPoints = [];
  drawing = false;

  drawRoofBtn.textContent = "Desenhar";
  houseInfo.textContent = "Casa: nenhuma";
  message.textContent = "Limpo";
}

function getCenter() {
  let lat = 0, lng = 0;
  roofPoints.forEach(p => {
    lat += p.lat;
    lng += p.lng;
  });
  return { lat: lat / roofPoints.length, lng: lng / roofPoints.length };
}

function saveData() {
  if (roofPoints.length < 3) {
    message.textContent = "Desenha o telhado primeiro";
    return false;
  }

  const areaSqm = google.maps.geometry.spherical.computeArea(
    roofPoints.map(p => new google.maps.LatLng(p.lat, p.lng))
  );

  const data = {
    address: addressInput.value,
    center: getCenter(),
    points: roofPoints,
    area: areaSqm,
    areaSqm
  };

  sessionStorage.setItem("roofSelection", JSON.stringify(data));
  return true;
}

drawRoofBtn.onclick = () => {
  if (!drawing) startDrawing();
  else finishDrawing();
};

clearRoofBtn.onclick = clearRoof;

nextStepBtn.onclick = () => {
  if (!saveData()) return;
  window.location.href = "questionario.html";
};

window.initMap = initMap;
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDb_0_8iNV8ojyt8nbqXKt7SBVgWGc-qRs&libraries=places,geometry&callback=initMap" async defer></script>

</body>
</html>
