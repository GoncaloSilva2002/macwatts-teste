spring.application.name=backend

# Render/Heroku-style port binding
server.port=${PORT:8080}

# Destinatario interno para receber os pedidos de orcamento
app.company.email=${APP_COMPANY_EMAIL:macwattstestes@gmail.com}

# SMTP (obrigatorio para enviar emails)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Remetente do email (se nao definido, usa spring.mail.username)
app.mail.from=${MAIL_FROM:${spring.mail.username:no-reply@localhost}}

# Envio real de email (falha se SMTP nao estiver configurado)
app.mail.skip-when-smtp-missing=false

# Integracao Odoo (JSON-RPC)
app.odoo.enabled=${ODOO_ENABLED:false}
app.odoo.url=${ODOO_URL:}
app.odoo.db=${ODOO_DB:}
app.odoo.login=${ODOO_LOGIN:}
app.odoo.api-key=${ODOO_API_KEY:}
app.odoo.model=${ODOO_MODEL:x_website_submission}
app.odoo.create-lead=${ODOO_CREATE_LEAD:true}